name: Build Big Brain AI APK
"on":
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build APK via Kivy Docker
        run: |
          mkdir -p $HOME/.buildozer
          chmod -R 777 $HOME/.buildozer
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v $HOME/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BigBrainAI
          path: bin/*.apk
          retention-days: 30
