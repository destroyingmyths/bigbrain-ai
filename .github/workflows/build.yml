name: Build Big Brain AI APK
"on":
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev ccache lld openjdk-17-jdk
      - name: Install buildozer
        run: pip install --upgrade pip && pip install buildozer cython==0.29.37
      - name: Build APK
        env:
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "26"
        run: buildozer android debug 2>&1
      - name: Upload APK
        run: |
          APK=$(find bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then exit 1; fi
          cp "$APK" BigBrainAI.apk
      - uses: actions/upload-artifact@v4
        with:
          name: BigBrainAI
          path: BigBrainAI.apk
          retention-days: 30
