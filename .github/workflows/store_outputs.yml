name: Store Remote Outputs

on:
  workflow_dispatch:

jobs:
  store:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Create output folder
      run: mkdir -p outputs/images

    - name: Add generated files
      run: |
        echo "This workflow is ready to receive files from Colab." > outputs/README.md

    - name: Commit and push
      run: |
        git config --global user.name "BigBrain-AI"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Store remote outputs"
        git push
