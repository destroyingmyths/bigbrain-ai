name: Build Big Brain AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.MEMORY_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-wheel \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            ccache

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Create app structure
        run: |
          mkdir -p bigbrain/assets

          # Copy kernel
          cp kernel.py bigbrain/kernel.py

          # Create main.py (Kivy app)
          cat > bigbrain/main.py << 'MAINEOF'
          import os
          import sys
          import threading
          from kivy.app import App
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.scrollview import ScrollView
          from kivy.uix.textinput import TextInput
          from kivy.uix.button import Button
          from kivy.uix.label import Label
          from kivy.uix.filechooser import FileChooserIconView
          from kivy.uix.popup import Popup
          from kivy.uix.image import Image as KivyImage
          from kivy.core.window import Window
          from kivy.utils import get_color_from_hex
          from kivy.metrics import dp
          from kivy.clock import Clock
          from kivy.uix.progressbar import ProgressBar
          from kivy.graphics import Color, RoundedRectangle
          import shutil

          # Gothic color palette
          BG_DARK       = get_color_from_hex("#0A000F")
          BG_MID        = get_color_from_hex("#110022")
          PURPLE_DEEP   = get_color_from_hex("#2D0045")
          PURPLE_MID    = get_color_from_hex("#6B00A8")
          PURPLE_LIGHT  = get_color_from_hex("#9B30FF")
          GREEN_NEON    = get_color_from_hex("#00FF88")
          GREEN_DIM     = get_color_from_hex("#00AA55")
          WHITE_SOFT    = get_color_from_hex("#E8D5FF")
          BLACK_PURE    = get_color_from_hex("#000000")
          GREY_DARK     = get_color_from_hex("#1A0028")

          Window.clearcolor = BG_DARK

          try:
              from kernel import OneMind
              brain = OneMind(api_key=os.environ.get("GEMINI_API_KEY", ""))
          except Exception as e:
              brain = None

          class MessageBubble(BoxLayout):
              def __init__(self, text, is_user=True, media_path=None, **kwargs):
                  super().__init__(**kwargs)
                  self.orientation = "vertical"
                  self.size_hint_y = None
                  self.padding = [dp(8), dp(4)]
                  self.spacing = dp(4)

                  bubble_color = PURPLE_DEEP if is_user else BG_MID
                  text_color   = WHITE_SOFT if is_user else list(get_color_from_hex("#C0FFA0"))

                  lbl = Label(
                      text=text,
                      markup=True,
                      size_hint_y=None,
                      text_size=(Window.width * 0.78, None),
                      halign="left",
                      valign="top",
                      color=text_color,
                      font_size=dp(14),
                      padding=[dp(12), dp(8)]
                  )
                  lbl.bind(texture_size=lambda inst, val: setattr(inst, "height", val[1] + dp(16)))
                  self.height = lbl.height + dp(16)
                  lbl.bind(height=lambda inst, val: setattr(self, "height", val + dp(16)))

                  with self.canvas.before:
                      Color(*bubble_color)
                      self.rect = RoundedRectangle(
                          pos=self.pos, size=self.size, radius=[dp(16)]
                      )
                  self.bind(pos=lambda *a: setattr(self.rect, "pos", self.pos))
                  self.bind(size=lambda *a: setattr(self.rect, "size", self.size))

                  self.add_widget(lbl)

                  if media_path and os.path.exists(media_path):
                      ext = os.path.splitext(media_path)[1].lower()
                      if ext in [".png", ".jpg", ".jpeg", ".ppm"]:
                          img = KivyImage(
                              source=media_path,
                              size_hint_y=None,
                              height=dp(200)
                          )
                          self.add_widget(img)
                          self.height += dp(210)

                      dl_btn = Button(
                          text="⬇ Download",
                          size_hint_y=None,
                          height=dp(36),
                          background_color=GREEN_DIM,
                          color=BLACK_PURE,
                          font_size=dp(13)
                      )
                      dl_btn.bind(on_press=lambda x: self._download(media_path))
                      self.add_widget(dl_btn)
                      self.height += dp(46)

              def _download(self, media_path):
                  try:
                      from android.storage import primary_external_storage_path
                      dest_dir = os.path.join(primary_external_storage_path(), "BigBrainAI")
                  except ImportError:
                      dest_dir = os.path.expanduser("~/Downloads/BigBrainAI")
                  os.makedirs(dest_dir, exist_ok=True)
                  dest = os.path.join(dest_dir, os.path.basename(media_path))
                  shutil.copy2(media_path, dest)

          class BigBrainChat(BoxLayout):
              def __init__(self, **kwargs):
                  super().__init__(**kwargs)
                  self.orientation = "vertical"
                  self.spacing = 0
                  self.uploaded_file = None
                  self._build_ui()

              def _build_ui(self):
                  # Header
                  header = BoxLayout(
                      size_hint_y=None,
                      height=dp(60),
                      padding=[dp(16), dp(8)]
                  )
                  with header.canvas.before:
                      Color(*PURPLE_DEEP)
                      self._header_rect = RoundedRectangle(
                          pos=header.pos, size=header.size, radius=[0]
                      )
                  header.bind(pos=lambda *a: setattr(self._header_rect, "pos", header.pos))
                  header.bind(size=lambda *a: setattr(self._header_rect, "size", header.size))

                  title = Label(
                      text="[b][color=9B30FF]BIG[/color] [color=00FF88]BRAIN[/color] [color=E8D5FF]AI[/color][/b]",
                      markup=True,
                      font_size=dp(22),
                      halign="left",
                      valign="middle"
                  )
                  header.add_widget(title)
                  self.add_widget(header)

                  # Chat scroll area
                  self.scroll = ScrollView(size_hint_y=1)
                  self.chat_layout = BoxLayout(
                      orientation="vertical",
                      size_hint_y=None,
                      spacing=dp(8),
                      padding=[dp(12), dp(12)]
                  )
                  self.chat_layout.bind(
                      minimum_height=self.chat_layout.setter("height")
                  )
                  self.scroll.add_widget(self.chat_layout)
                  self.add_widget(self.scroll)

                  # Thinking indicator
                  self.thinking_label = Label(
                      text="",
                      size_hint_y=None,
                      height=dp(24),
                      color=PURPLE_LIGHT,
                      font_size=dp(12)
                  )
                  self.add_widget(self.thinking_label)

                  # Input row
                  input_row = BoxLayout(
                      size_hint_y=None,
                      height=dp(56),
                      spacing=dp(6),
                      padding=[dp(8), dp(6)]
                  )
                  with input_row.canvas.before:
                      Color(*BG_MID)
                      RoundedRectangle(pos=input_row.pos, size=input_row.size, radius=[0])

                  # Upload button
                  upload_btn = Button(
                      text="📎",
                      size_hint_x=None,
                      width=dp(44),
                      size_hint_y=None,
                      height=dp(44),
                      background_color=PURPLE_MID,
                      font_size=dp(20)
                  )
                  upload_btn.bind(on_press=self._open_file_chooser)
                  input_row.add_widget(upload_btn)

                  # Text input
                  self.text_input = TextInput(
                      hint_text="Ask Big Brain anything...",
                      multiline=False,
                      size_hint_y=None,
                      height=dp(44),
                      background_color=GREY_DARK,
                      foreground_color=WHITE_SOFT,
                      hint_text_color=list(PURPLE_LIGHT) + [0.5],
                      cursor_color=GREEN_NEON,
                      font_size=dp(14),
                      padding=[dp(12), dp(10)]
                  )
                  self.text_input.bind(on_text_validate=self._on_send)
                  input_row.add_widget(self.text_input)

                  # Send button
                  send_btn = Button(
                      text="▶",
                      size_hint_x=None,
                      width=dp(44),
                      size_hint_y=None,
                      height=dp(44),
                      background_color=PURPLE_MID,
                      color=GREEN_NEON,
                      font_size=dp(20),
                      bold=True
                  )
                  send_btn.bind(on_press=self._on_send)
                  input_row.add_widget(send_btn)

                  self.add_widget(input_row)

                  # Welcome message
                  self._add_message(
                      "Welcome to Big Brain AI.\n\nI can chat, reason, generate images, audio, video, and code.\nAll professional work is handled privately on your device.\n\nWhat shall we create?",
                      is_user=False
                  )

              def _add_message(self, text, is_user=True, media_path=None):
                  bubble = MessageBubble(
                      text=text,
                      is_user=is_user,
                      media_path=media_path,
                      size_hint_x=0.85,
                      pos_hint={"right": 1} if is_user else {"x": 0}
                  )
                  self.chat_layout.add_widget(bubble)
                  Clock.schedule_once(lambda dt: setattr(
                      self.scroll, "scroll_y", 0
                  ), 0.1)

              def _on_send(self, *args):
                  msg = self.text_input.text.strip()
                  if not msg:
                      return
                  self.text_input.text = ""
                  self._add_message(msg, is_user=True)
                  self.thinking_label.text = "⚡ Big Brain is thinking..."
                  threading.Thread(
                      target=self._process_message,
                      args=(msg,),
                      daemon=True
                  ).start()

              def _process_message(self, msg):
                  try:
                      if brain:
                          response, media = brain.chat(msg, self.uploaded_file)
                      else:
                          response = "Brain not initialized. Check GEMINI_API_KEY."
                          media = None
                  except Exception as e:
                      response = f"Error: {e}"
                      media = None
                  self.uploaded_file = None
                  Clock.schedule_once(lambda dt: self._show_response(response, media), 0)

              def _show_response(self, response, media_path):
                  self.thinking_label.text = ""
                  self._add_message(response, is_user=False, media_path=media_path)

              def _open_file_chooser(self, *args):
                  chooser = FileChooserIconView(path=os.path.expanduser("~"))
                  popup = Popup(
                      title="Select File",
                      content=chooser,
                      size_hint=(0.95, 0.8)
                  )
                  def _on_select(inst, selection, *args):
                      if selection:
                          path = selection[0]
                          try:
                              with open(path, "r", errors="ignore") as f:
                                  content = f.read(50000)
                              self.uploaded_file = {
                                  "name": os.path.basename(path),
                                  "content": content,
                                  "path": path
                              }
                              self.thinking_label.text = f"📎 {os.path.basename(path)} attached"
                          except Exception:
                              self.uploaded_file = {"name": os.path.basename(path),
                                                    "content": "", "path": path}
                          popup.dismiss()
                  chooser.bind(on_submit=_on_select)
                  popup.open()

          class BigBrainApp(App):
              def build(self):
                  self.title = "Big Brain AI"
                  return BigBrainChat()

          if __name__ == "__main__":
              BigBrainApp().run()
          MAINEOF

          # Create buildozer.spec
          cat > bigbrain/buildozer.spec << 'SPECEOF'
          [app]
          title = Big Brain AI
          package.name = bigbrain
          package.domain = org.bigbrain
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,json
          version = 1.0.0
          requirements = python3,kivy==2.3.0,pillow,requests,certifi,charset-normalizer,idna,urllib3
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,RECORD_AUDIO
          android.api = 33
          android.minapi = 26
          android.ndk = 25b
          android.archs = arm64-v8a
          android.allow_backup = True
          android.release_artifact = apk
          [buildozer]
          log_level = 2
          warn_on_root = 1
          SPECEOF

      - name: Build APK
        run: |
          cd bigbrain
          buildozer android debug 2>&1 | tail -100

      - name: Find and rename APK
        run: |
          find bigbrain -name "*.apk" -exec cp {} BigBrainAI.apk \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BigBrainAI
          path: BigBrainAI.apk
          retention-days: 30
