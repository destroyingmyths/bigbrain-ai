---
name: Build Big Brain AI APK

on:  # yamllint disable-line rule:truthy
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create app structure
        run: |
          mkdir -p app
          cp kernel.py app/kernel.py
          cp main.py app/main.py
          cp buildozer.spec app/buildozer.spec

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/app:/home/user/hostcwd \
            -v /tmp/buildozer-cache:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BigBrainAI
          path: app/bin/*.apk
          retention-days: 30
